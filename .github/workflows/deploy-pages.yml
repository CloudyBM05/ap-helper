# GitHub Pages deployment workflow
name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main", "gh-pages" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        working-directory: ./ap-helper
        
      - name: Build
        run: npm run build
        working-directory: ./ap-helper
          
      - name: List built files
        run: |
          echo "=== Build directory contents ==="
          ls -la ap-helper/dist/
          echo "=== Assets directory ==="
          ls -la ap-helper/dist/assets/ || echo "No assets directory found"
          echo "=== index.html content ==="
          cat ap-helper/dist/index.html | head -20
          echo "=== Checking for asset references ==="
          grep -E "(src=|href=)" ap-helper/dist/index.html || echo "No asset references found"
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './ap-helper/dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
